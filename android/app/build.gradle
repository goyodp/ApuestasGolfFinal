apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
  keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
  namespace "com.apuestas.golf"

  // ✅ Requerido por androidx.core 1.17.0 / activity 1.11.0
  compileSdk 36

  defaultConfig {
    applicationId "com.apuestas.golf"
    minSdk 23
    targetSdk 36
    versionCode 1
    versionName "1.0"
    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

    aaptOptions {
      ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
  }

  signingConfigs {
    release {
      // ✅ Solo aplica firma si existe key.properties
      if (keystorePropertiesFile.exists()) {
        storeFile file(keystoreProperties["storeFile"])
        storePassword keystoreProperties["storePassword"]
        keyAlias keystoreProperties["keyAlias"]
        keyPassword keystoreProperties["keyPassword"]
      }
    }
  }

  buildTypes {
    release {
      // ✅ Si NO hay keystore, igual compila (pero no firma release)
      if (keystorePropertiesFile.exists()) {
        signingConfig signingConfigs.release
      }
      minifyEnabled false
      shrinkResources false
      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
    }
    debug {
      // default
    }
  }

  // ✅ Java 17 / AGP 8.x
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

repositories {
  flatDir {
    dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
  }
}

dependencies {
  implementation fileTree(include: ['*.jar'], dir: 'libs')

  implementation "androidx.appcompat:appcompat:1.7.0"
  implementation "androidx.coordinatorlayout:coordinatorlayout:1.2.0"
  implementation "androidx.core:core-splashscreen:1.0.1"

  implementation project(':capacitor-android')
  implementation project(':capacitor-cordova-android-plugins')

  testImplementation "junit:junit:4.13.2"
  androidTestImplementation "androidx.test.ext:junit:1.2.1"
  androidTestImplementation "androidx.test.espresso:espresso-core:3.6.1"
}

apply from: 'capacitor.build.gradle'
